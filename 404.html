<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <title>404 — Page Not Found | Hailey Device Repair</title>
  <meta name="description" content="This page doesn't exist, but your device can still be fixed." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:       #0d1117;
      --bg-surface:    #161b22;
      --bg-elevated:   #1c2230;
      --text-primary:  #e6edf3;
      --text-secondary:#8b949e;
      --text-muted:    #484f58;
      --accent:        #4f8ef7;
      --accent-hover:  #6ba3fa;
      --accent-dim:    rgba(79,142,247,0.12);
      --accent-glow:   rgba(79,142,247,0.25);
      --border-subtle: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.2);
      --font-body:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display:  'Plus Jakarta Sans', 'Inter', sans-serif;
      --radius-md:     10px;
      --radius-lg:     16px;
      --radius-pill:   999px;
    }

    [data-theme="light"] {
      --bg-base:       #f8fafc;
      --bg-surface:    #ffffff;
      --bg-elevated:   #f1f5f9;
      --text-primary:  #0f172a;
      --text-secondary:#475569;
      --text-muted:    #94a3b8;
      --accent:        #2563eb;
      --accent-hover:  #1d4ed8;
      --accent-dim:    rgba(37,99,235,0.08);
      --accent-glow:   rgba(37,99,235,0.2);
      --border-subtle: rgba(0,0,0,0.06);
      --border-strong: rgba(0,0,0,0.18);
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }
    [data-theme="light"] body::before {
      background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
    }

    /* Glow */
    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      opacity: 0.3;
      background: radial-gradient(circle, rgba(79,142,247,0.3) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 520px;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, #a371f7 50%, #f78166 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: -0.03em;
    }

    .error-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: var(--accent-dim);
      border-radius: 50%;
      color: var(--accent);
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    .error-icon .material-symbols-outlined {
      font-size: 2rem;
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.4rem;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 200ms ease;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn .material-symbols-outlined {
      font-size: 1.1rem;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border-color: var(--border-strong);
    }
    .btn-outline:hover {
      background: var(--bg-elevated);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .fun-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 2rem;
    }

    .footer-link {
      position: absolute;
      bottom: 2rem;
      z-index: 1;
    }
    .footer-link a {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 200ms;
    }
    .footer-link a:hover { color: var(--accent); }
    .footer-link .material-symbols-outlined {
      font-size: 1.1rem;
      color: var(--accent);
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20;
    }

    /* Respect theme preference */
    @media (prefers-color-scheme: light) {
      html:not([data-theme="dark"]) {
        --bg-base: #f8fafc; --text-primary: #0f172a;
        --text-secondary: #475569; --text-muted: #94a3b8;
      }
    }
  </style>
  <script>
    // Match main site theme
    (function(){
      var t = localStorage.getItem('hdr-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches)
        document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>

  <div class="content">
    <div class="error-icon">
      <span class="material-symbols-outlined">handyman</span>
    </div>

    <div class="error-code">404</div>

    <h1>This page needs repair too.</h1>

    <p>
      Looks like this link is broken — but unlike your phone screen,
      I can't fix this one. Let's get you back on track.
    </p>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        <span class="material-symbols-outlined">home</span>
        Back to Home
      </a>
      <a href="sms:+12083666111" class="btn btn-outline">
        <span class="material-symbols-outlined">sms</span>
        Text for Help
      </a>
    </div>

    <p class="fun-text">
      At least your browser is working. 🥭
    </p>
  </div>

  <div class="footer-link">
    <a href="/">
      <span class="material-symbols-outlined">smartphone</span>
      Hailey Device <strong>Repair</strong>
    </a>
  </div>
</body>
</html>
