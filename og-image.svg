<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Logo area -->
  <rect x="80" y="180" width="72" height="72" rx="16" fill="#1a1f2e" stroke="#7c3aed" stroke-width="2"/>
  <text x="116" y="228" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="42" fill="#7c3aed">H</text>
  <!-- Text -->
  <text x="80" y="310" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="52" fill="#f0f6fc">Hailey Device Repair</text>
  <text x="80" y="365" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="28" fill="#8b949e">Don't replace it. Let me fix it.</text>
  <!-- Tagline pills -->
  <rect x="80" y="400" width="120" height="36" rx="18" fill="rgba(124,58,237,0.15)"/>
  <text x="140" y="424" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="15" fill="#7c3aed">iPhone</text>
  <rect x="215" y="400" width="130" height="36" rx="18" fill="rgba(124,58,237,0.15)"/>
  <text x="280" y="424" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="15" fill="#7c3aed">Android</text>
  <rect x="360" y="400" width="120" height="36" rx="18" fill="rgba(124,58,237,0.15)"/>
  <text x="420" y="424" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="15" fill="#7c3aed">Laptop</text>
  <rect x="495" y="400" width="130" height="36" rx="18" fill="rgba(124,58,237,0.15)"/>
  <text x="560" y="424" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="15" fill="#7c3aed">Console</text>
  <!-- Location -->
  <text x="80" y="475" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="22" fill="#8b949e">📍 Hailey, Idaho · Wood River Valley</text>
  <!-- Phone -->
  <text x="80" y="520" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="22" fill="#06b6d4">📱 (208) 366-6111</text>
  <!-- Decorative dots -->
  <circle cx="1050" cy="200" r="80" fill="rgba(124,58,237,0.08)"/>
  <circle cx="1100" cy="350" r="120" fill="rgba(6,182,212,0.06)"/>
  <circle cx="950" cy="450" r="60" fill="rgba(124,58,237,0.05)"/>
</svg>